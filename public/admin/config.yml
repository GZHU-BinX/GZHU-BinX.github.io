backend:
  name: github
  repo: GZHU-BinX/GZHU-BinX.github.io
  branch: main
  # TODO: 将下面的 your-site-name.netlify.app 替换为你在 Netlify 上创建的站点域名
  site_domain: https://zingy-palmier-0bed72.netlify.app
  base_url: https://api.netlify.com
  auth_endpoint: /auth

publish_mode: editorial_workflow
media_folder: "public/images"
public_folder: "/images"

locale: "zh_Hans"

collections:
  # ─── 学术成果 ──────────────────────────────────────────
  - name: "achievements"
    label: "学术成果"
    files:
      - name: "achievements-data"
        label: "学术成果数据"
        file: "src/data/achievements.json"
        format: "json"
        fields:
          - label: "学术论文"
            name: "papers"
            widget: "list"
            fields:
              - { label: "年份", name: "year", widget: "number", value_type: "int" }
              - { label: "会议/期刊", name: "venue", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "作者", name: "authors", widget: "string" }
              - { label: "研究方向", name: "dir", widget: "select", options: ["智能渗透", "智能漏洞挖掘", "大模型安全"] }
          - label: "教改论文"
            name: "eduPapers"
            widget: "list"
            fields:
              - { label: "年份", name: "year", widget: "number", value_type: "int" }
              - { label: "会议/期刊", name: "venue", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "作者", name: "authors", widget: "string" }
          - label: "承担项目"
            name: "projects"
            widget: "list"
            fields:
              - { label: "项目名称", name: "title", widget: "string" }
              - { label: "来源", name: "source", widget: "string" }
              - { label: "周期", name: "period", widget: "string" }
              - { label: "状态", name: "status", widget: "select", options: ["在研", "结题"] }
          - label: "竞赛获奖"
            name: "awards"
            widget: "list"
            fields:
              - { label: "年份", name: "year", widget: "number", value_type: "int" }
              - { label: "时间", name: "time", widget: "string" }
              - { label: "获奖学生", name: "students", widget: "string" }
              - { label: "竞赛名称", name: "competition", widget: "string" }
              - { label: "主办方", name: "organizer", widget: "string", required: false }
              - { label: "级别", name: "level", widget: "string", required: false }
              - { label: "奖项", name: "award", widget: "string" }
          - label: "漏洞披露"
            name: "vulns"
            widget: "list"
            fields:
              - { label: "漏洞编号", name: "id", widget: "string" }
              - { label: "贡献者", name: "contributors", widget: "string" }
              - { label: "日期", name: "date", widget: "string" }

  # ─── 团队成员 ──────────────────────────────────────────
  - name: "members"
    label: "团队成员"
    files:
      - name: "members-data"
        label: "团队成员数据"
        file: "src/data/members.json"
        format: "json"
        fields:
          - label: "课题组负责人"
            name: "advisor"
            widget: "object"
            fields:
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "职称", name: "title", widget: "string" }
              - { label: "头像URL", name: "avatar", widget: "string", required: false }
              - { label: "主页URL", name: "profileUrl", widget: "string", required: false }
              - { label: "邮箱", name: "email", widget: "string" }
              - { label: "研究兴趣", name: "interests", widget: "list", field: { label: "兴趣", name: "interest", widget: "string" } }
              - { label: "简介", name: "bio", widget: "text" }
              - { label: "荣誉奖项", name: "awards", widget: "list", field: { label: "奖项", name: "award", widget: "string" } }
          - label: "教师"
            name: "teachers"
            widget: "list"
            fields:
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "职称", name: "title", widget: "string" }
              - { label: "头像URL", name: "avatar", widget: "string", required: false }
              - { label: "主页URL", name: "profileUrl", widget: "string", required: false }
              - { label: "邮箱", name: "email", widget: "string" }
              - { label: "研究兴趣", name: "interests", widget: "list", field: { label: "兴趣", name: "interest", widget: "string" } }
              - { label: "简介", name: "bio", widget: "text" }
              - { label: "荣誉奖项", name: "awards", widget: "list", field: { label: "奖项", name: "award", widget: "string" }, required: false }
          - label: "博士研究生"
            name: "phds"
            widget: "list"
            fields:
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "年级", name: "grade", widget: "string" }
              - { label: "研究方向", name: "direction", widget: "string" }
              - { label: "头像URL", name: "avatar", widget: "string", required: false }
              - { label: "主页URL", name: "profileUrl", widget: "string", required: false }
              - { label: "邮箱", name: "email", widget: "string", required: false }
              - { label: "简介", name: "bio", widget: "text", required: false }
              - { label: "研究兴趣", name: "interests", widget: "list", field: { label: "兴趣", name: "interest", widget: "string" }, required: false }
              - { label: "荣誉奖项", name: "awards", widget: "list", field: { label: "奖项", name: "award", widget: "string" }, required: false }
          - label: "硕士研究生"
            name: "masters"
            widget: "list"
            fields:
              - { label: "姓名", name: "name", widget: "string" }
              - { label: "年级", name: "grade", widget: "string" }
              - { label: "研究方向", name: "direction", widget: "string" }
          - label: "毕业去向"
            name: "alumniByYear"
            widget: "list"
            fields:
              - { label: "届", name: "year", widget: "string" }
              - { label: "去向", name: "dests", widget: "list", field: { label: "单位", name: "dest", widget: "string" } }

  # ─── 课题组动态 ──────────────────────────────────────────
  - name: "events"
    label: "课题组动态"
    files:
      - name: "events-data"
        label: "课题组动态数据"
        file: "src/data/events.json"
        format: "json"
        fields:
          - label: "课题组动态"
            name: "events"
            widget: "list"
            fields:
              - { label: "年份", name: "year", widget: "number", value_type: "int" }
              - { label: "月份", name: "month", widget: "string" }
              - { label: "类型", name: "type", widget: "string" }
              - { label: "标签", name: "tag", widget: "select", options: ["paper", "project", "award", "academic", "vuln"] }
              - { label: "内容", name: "content", widget: "text" }
          - label: "媒体报道"
            name: "medias"
            widget: "list"
            fields:
              - { label: "来源", name: "source", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "链接", name: "url", widget: "string" }
              - { label: "日期", name: "date", widget: "string" }

  # ─── 团建风采 ──────────────────────────────────────────
  - name: "gallery"
    label: "团建风采"
    files:
      - name: "gallery-data"
        label: "团建风采数据"
        file: "src/data/gallery.json"
        format: "json"
        fields:
          - label: "团建活动"
            name: "activities"
            widget: "list"
            fields:
              - { label: "标题", name: "title", widget: "string" }
              - { label: "日期", name: "date", widget: "string" }
              - { label: "分类", name: "category", widget: "select", options: ["团建出游", "学术聚餐", "体育运动", "节日庆祝"] }
              - { label: "描述", name: "description", widget: "text" }
              - { label: "封面图URL", name: "cover", widget: "string" }
              - { label: "图片URL列表", name: "images", widget: "list", field: { label: "图片URL", name: "image", widget: "string" } }

  # ─── 首页 ──────────────────────────────────────────
  - name: "home"
    label: "首页"
    files:
      - name: "home-data"
        label: "首页数据"
        file: "src/data/home.json"
        format: "json"
        fields:
          - label: "研究方向"
            name: "researchDirections"
            widget: "list"
            fields:
              - { label: "SVG Path", name: "svgPath", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }
          - label: "最新动态"
            name: "recentNews"
            widget: "list"
            fields:
              - { label: "日期", name: "date", widget: "string" }
              - { label: "内容", name: "text", widget: "text" }
          - label: "统计数据"
            name: "stats"
            widget: "list"
            fields:
              - { label: "数字", name: "num", widget: "string" }
              - { label: "标签", name: "label", widget: "string" }
          - label: "课题组信息"
            name: "labInfo"
            widget: "list"
            fields:
              - { label: "标签", name: "label", widget: "string" }
              - { label: "值", name: "value", widget: "string" }
          - label: "荣誉标签"
            name: "honors"
            widget: "list"
            field: { label: "荣誉", name: "honor", widget: "string" }

  # ─── 加入我们 ──────────────────────────────────────────
  - name: "joinus"
    label: "加入我们"
    files:
      - name: "joinus-data"
        label: "加入我们数据"
        file: "src/data/joinus.json"
        format: "json"
        fields:
          - label: "招募方向"
            name: "positions"
            widget: "list"
            fields:
              - { label: "职位名称", name: "title", widget: "string" }
              - { label: "标签", name: "badge", widget: "string" }
              - { label: "颜色", name: "color", widget: "select", options: ["primary", "teal", "amber"] }
              - { label: "要求列表", name: "items", widget: "list", field: { label: "要求", name: "item", widget: "string" } }
          - label: "我们能提供什么"
            name: "benefits"
            widget: "list"
            fields:
              - { label: "图标(Emoji)", name: "icon", widget: "string" }
              - { label: "标题", name: "title", widget: "string" }
              - { label: "描述", name: "desc", widget: "text" }

  # ─── 友情链接 ──────────────────────────────────────────
  - name: "friends"
    label: "友情链接"
    files:
      - name: "friends-data"
        label: "友情链接数据"
        file: "src/data/friends.json"
        format: "json"
        fields:
          - label: "友情链接分类"
            name: "friends"
            widget: "list"
            fields:
              - { label: "分类名称", name: "category", widget: "string" }
              - label: "链接列表"
                name: "links"
                widget: "list"
                fields:
                  - { label: "名称", name: "name", widget: "string" }
                  - { label: "链接", name: "url", widget: "string" }
